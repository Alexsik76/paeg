labs:
  - id: 1
    name: "Lab 1: Simple Protocol"
    protocol: "simple"
    settings:
      num_voters: 5
      candidates:
        - "Alice (Кандидат 1)"
        - "Bob (Кандидат 2)"
    scenarios:
      - id: "scenario_normal"
        name: "Normal Vote (1 Voter)"
        description: "A registered voter casts a valid vote."
      - id: "scenario_simulate_all"
        name: "Simulate Full Election (All Voters)"
        description: "Simulate all 5 voters casting their votes."
      - id: "scenario_double"
        name: "Double Voting"
        description: "A registered voter attempts to vote twice."
      - id: "scenario_unregistered"
        name: "Unregistered Voter"
        description: "An unregistered individual attempts to vote."
      - id: "scenario_tampered"
        name: "Tampered Ballot"
        description: "A ballot's content is altered after it was signed."

  - id: 2
    name: "Lab 2: Blind Signature Protocol"
    protocol: "blind"
    settings:
      num_voters: 5
      candidates:
        - "Alice (Кандидат 1)"
        - "Bob (Кандидат 2)"
    scenarios:
      - id: "scenario_normal_blind"
        name: "Normal Vote with Blind Signature"
        description: "A voter successfully requests a blind signature and votes."
      - id: "scenario_simulate_all_blind"
        name: "Simulate Full Election (Blind)"
        description: "Simulate all 5 voters casting their votes with blind signatures."
      - id: "scenario_double_request_blind"
        name: "Double Signature Request"
        description: "A voter tries to get a second signed ballot set from CVK."
      - id: "scenario_double_vote_blind"
        name: "Double Voting (Same ID)"
        description: "A voter tries to vote twice using two signed ballots from the same set."
      - id: "scenario_tampered_blind"
        name: "Tampered Ballot during Blind Sign"
        description: "A voter tries to sneak a tampered ballot set past CVK's 9/10 check."

  - id: 3
    name: "Lab 3: Distribution of Powers (Split)"
    protocol: "split"
    settings:
      num_voters: 5
      candidates:
        - "Alice (Кандидат 1)"
        - "Bob (Кандидат 2)"
    scenarios:
      - id: "scenario_normal_split"
        name: "Normal Vote (Split Powers)"
        description: "A voter gets RN from BR, then votes successfully at CVK. Finally verifies."
      - id: "scenario_simulate_all_split"
        name: "Simulate Full Election (Split)"
        description: "Simulate all 5 voters casting their votes."
      - id: "scenario_double_rn_split"
        name: "Double RN Request"
        description: "A voter tries to get a second Registration Number from BR."
      - id: "scenario_double_vote_split"
        name: "Double Voting (Same RN)"
        description: "A voter registers once but tries to send two ballots to CVK."
      - id: "scenario_invalid_rn_split"
        name: "Invalid RN Usage"
        description: "A voter attempts to use an RN not issued by the BR."
      - id: "scenario_verify_split"
        name: "Vote Verification"
        description: "A voter verifies their cast vote in the published CVK ballot list."

  - id: 4
    name: "Lab 4: Multiplicative Homomorphy (Split Factors)"
    protocol: "factor"
    settings:
      num_voters: 5
      candidates:
        - "Alice (ID 12)"
        - "Bob (ID 24)"
      candidate_ids:
        "Alice (ID 12)": 12
        "Bob (ID 24)": 24
    scenarios:
      - id: "scenario_normal_factor"
        name: "Normal Vote (Factor Split)"
        description: "Voter splits ID into factors, VCs verify, CVK joins and decrypts."
      - id: "scenario_simulate_all_factor"
        name: "Simulate Full Election (Factor)"
        description: "All 5 voters cast factorized ballots."
      - id: "scenario_tamper_factor"
        name: "Tamper with Factor"
        description: "One VC alters a factor, CVK decryption results in an invalid ID."

  - id: 5
    name: "Lab 5: Decentralized E-voting (No Commission)"
    protocol: "decentralized"
    settings:
      num_voters: 5
      candidates:
        - "Alice (ID 12)"
        - "Bob (ID 24)"
      candidate_ids:
        "Alice (ID 12)": 12
        "Bob (ID 24)": 24
    scenarios:
      - id: "scenario_normal_decentralized"
        name: "Normal Vote (Decentralized)"
        description: "A voter prepares a multi-layered ballot. Others participate in rounds."
      - id: "scenario_simulate_all_decentralized"
        name: "Simulate Full Election (Decentralized)"
        description: "All 5 voters participate in multi-layered encryption and decryption rounds."
      - id: "scenario_double_vote_decentralized"
        name: "Double Voting Attempt"
        description: "A voter tries to inject two ballots into the decentralized round."
      - id: "scenario_tamper_decentralized"
        name: "Ballot Tampering Detection"
        description: "Voter A attempts to modify another voter's ballot during their turn."
  - id: 6
    name: "Lab 6: Advanced Protocol (Blind + Split + Hierarchy)"
    protocol: "lab6_advanced"
    settings:
      num_voters: 5
      candidates:
        - "Alice (ID 12)"
        - "Bob (ID 24)"
      candidate_ids:
        "Alice (ID 12)": 12
        "Bob (ID 24)": 24
      animation_delay: 2
    scenarios:
      - id: "scenario_normal_lab6"
        name: "Normal Vote (Advanced)"
        description: "Voter uses blind signatures and split parts across LC/MC hierarchy."
      - id: "scenario_simulate_all_lab6"
        name: "Simulate Full Election (Advanced)"
        description: "All 5 voters participate in the multi-level protocol."
      - id: "scenario_double_vote_lab6"
        name: "Double Voting Attempt (Advanced)"
        description: "Voter tries to get extra signatures or reuse part IDs."
      - id: "scenario_tamper_lab6"
        name: "Tampered Split Attempt"
        description: "Attacker modifies a part or signature before LC verification."
